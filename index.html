<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebP Конвертер</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    color: #333;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  h1 {
    text-align: center;
    margin-bottom: 8px;
    color: #2d3748;
    font-size: 28px;
  }
  .subtitle {
    text-align: center;
    color: #718096;
    margin-bottom: 28px;
    font-size: 14px;
  }
  .drop-zone {
    border: 3px dashed #cbd5e0;
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #f7fafc;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: #667eea;
    background: #edf2ff;
  }
  .drop-zone-icon { font-size: 48px; margin-bottom: 12px; }
  .drop-zone-text { color: #4a5568; font-size: 16px; margin-bottom: 4px; }
  .drop-zone-hint { color: #a0aec0; font-size: 13px; }
  #fileInput { display: none; }
  .controls {
    margin-top: 24px;
    padding: 20px;
    background: #f7fafc;
    border-radius: 12px;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }
  .control-group { display: flex; align-items: center; gap: 10px; }
  label { color: #4a5568; font-size: 14px; font-weight: 500; }
  input[type="range"] { width: 160px; }
  .quality-value {
    min-width: 36px;
    font-weight: 600;
    color: #667eea;
  }
  select {
    padding: 6px 10px;
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    background: #fff;
    font-size: 14px;
  }
  .btn {
    background: #667eea;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn:hover { background: #5a67d8; transform: translateY(-1px); }
  .btn:disabled { background: #cbd5e0; cursor: not-allowed; transform: none; }
  .btn-secondary { background: #48bb78; }
  .btn-secondary:hover { background: #38a169; }
  .btn-danger { background: #f56565; padding: 6px 12px; font-size: 12px; }
  .btn-danger:hover { background: #e53e3e; }
  .files-list { margin-top: 24px; }
  .file-item {
    background: #f7fafc;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .file-preview {
    width: 60px;
    height: 60px;
    border-radius: 6px;
    object-fit: cover;
    background: #e2e8f0;
  }
  .file-info { flex: 1; min-width: 0; }
  .file-name {
    font-weight: 600;
    color: #2d3748;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 14px;
  }
  .file-sizes {
    font-size: 12px;
    color: #718096;
    margin-top: 4px;
  }
  .saved {
    color: #48bb78;
    font-weight: 600;
  }
  .file-status {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    background: #fed7d7;
    color: #c53030;
  }
  .file-status.done {
    background: #c6f6d5;
    color: #22543d;
  }
  .file-status.processing {
    background: #feebc8;
    color: #7c2d12;
  }
  .actions-row {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .hidden { display: none; }
  footer {
    text-align: center;
    margin-top: 24px;
    color: #a0aec0;
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>WebP Конвертер</h1>
    <p class="subtitle">Конвертация JPG, PNG, GIF, BMP → WebP прямо в браузере</p>

    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-icon">📁</div>
      <div class="drop-zone-text">Перетащи изображения сюда или кликни для выбора</div>
      <div class="drop-zone-hint">Поддерживаются JPG, PNG, GIF, BMP • Множественный выбор</div>
      <input type="file" id="fileInput" accept="image/*" multiple>
    </div>

    <div class="controls">
      <div class="control-group">
        <label for="quality">Качество:</label>
        <input type="range" id="quality" min="10" max="100" value="90">
        <span class="quality-value" id="qualityValue">90</span>
      </div>
    </div>

    <div class="files-list" id="filesList"></div>

    <div class="actions-row hidden" id="actionsRow">
      <button class="btn" id="convertBtn">Конвертировать всё</button>
      <button class="btn btn-secondary" id="downloadAllBtn">Скачать все (ZIP)</button>
      <button class="btn btn-danger" id="clearBtn" style="padding: 10px 20px; font-size: 14px;">Очистить</button>
    </div>
  </div>
  <footer>Работает полностью в браузере • Файлы не загружаются на сервер</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const filesList = document.getElementById('filesList');
const qualitySlider = document.getElementById('quality');
const qualityValue = document.getElementById('qualityValue');
const convertBtn = document.getElementById('convertBtn');
const downloadAllBtn = document.getElementById('downloadAllBtn');
const clearBtn = document.getElementById('clearBtn');
const actionsRow = document.getElementById('actionsRow');

let files = [];

qualitySlider.addEventListener('input', () => {
  qualityValue.textContent = qualitySlider.value;
});

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(fileList) {
  for (const file of fileList) {
    if (!file.type.startsWith('image/')) continue;
    const id = Date.now() + Math.random();
    files.push({ id, file, converted: null, status: 'pending' });
  }
  renderFiles();
}

function renderFiles() {
  filesList.innerHTML = '';
  if (files.length === 0) {
    actionsRow.classList.add('hidden');
    return;
  }
  actionsRow.classList.remove('hidden');

  files.forEach(item => {
    const div = document.createElement('div');
    div.className = 'file-item';

    const preview = document.createElement('img');
    preview.className = 'file-preview';
    preview.src = URL.createObjectURL(item.file);

    const info = document.createElement('div');
    info.className = 'file-info';

    const name = document.createElement('div');
    name.className = 'file-name';
    name.textContent = item.file.name;

    const sizes = document.createElement('div');
    sizes.className = 'file-sizes';
    const origSize = formatSize(item.file.size);
    if (item.converted) {
      const newSize = formatSize(item.converted.size);
      const saved = Math.round((1 - item.converted.size / item.file.size) * 100);
      sizes.innerHTML = `${origSize} → ${newSize} <span class="saved">(-${saved}%)</span>`;
    } else {
      sizes.textContent = origSize;
    }

    info.appendChild(name);
    info.appendChild(sizes);

    const status = document.createElement('div');
    status.className = 'file-status';
    if (item.status === 'pending') {
      status.textContent = 'Ожидает';
      status.style.background = '#e2e8f0';
      status.style.color = '#4a5568';
    } else if (item.status === 'processing') {
      status.className = 'file-status processing';
      status.textContent = 'Обработка...';
    } else if (item.status === 'done') {
      status.className = 'file-status done';
      status.textContent = 'Готово';
    }

    const actions = document.createElement('div');
    actions.style.display = 'flex';
    actions.style.gap = '6px';

    if (item.converted) {
      const dlBtn = document.createElement('button');
      dlBtn.className = 'btn';
      dlBtn.style.padding = '6px 12px';
      dlBtn.style.fontSize = '12px';
      dlBtn.textContent = '↓';
      dlBtn.onclick = () => downloadOne(item);
      actions.appendChild(dlBtn);
    }

    const removeBtn = document.createElement('button');
    removeBtn.className = 'btn btn-danger';
    removeBtn.textContent = '✕';
    removeBtn.onclick = () => {
      files = files.filter(f => f.id !== item.id);
      renderFiles();
    };
    actions.appendChild(removeBtn);

    div.appendChild(preview);
    div.appendChild(info);
    div.appendChild(status);
    div.appendChild(actions);
    filesList.appendChild(div);
  });
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

function getExtension(mime) {
  return { 'image/webp': 'webp', 'image/jpeg': 'jpg', 'image/png': 'png' }[mime] || 'webp';
}

function getOutputName(original, mime) {
  const base = original.replace(/\.[^.]+$/, '');
  return base + '.' + getExtension(mime);
}

async function convertOne(item) {
  item.status = 'processing';
  renderFiles();

  const mime = 'image/webp';
  const quality = parseInt(qualitySlider.value) / 100;

  const img = await loadImage(item.file);
  const w = img.naturalWidth;
  const h = img.naturalHeight;

  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);

  const blob = await new Promise(res => canvas.toBlob(res, mime, quality));
  item.converted = { blob, size: blob.size, mime };
  item.status = 'done';
  renderFiles();
}

function loadImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

function downloadOne(item) {
  if (!item.converted) return;
  const url = URL.createObjectURL(item.converted.blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = getOutputName(item.file.name, item.converted.mime);
  a.click();
  URL.revokeObjectURL(url);
}

convertBtn.addEventListener('click', async () => {
  convertBtn.disabled = true;
  convertBtn.textContent = 'Конвертация...';
  for (const item of files) {
    if (!item.converted) {
      try { await convertOne(item); }
      catch (e) { console.error(e); item.status = 'pending'; }
    }
  }
  convertBtn.disabled = false;
  convertBtn.textContent = 'Конвертировать всё';
});

downloadAllBtn.addEventListener('click', async () => {
  const done = files.filter(f => f.converted);
  if (done.length === 0) {
    alert('Сначала конвертируй файлы');
    return;
  }
  if (done.length === 1) {
    downloadOne(done[0]);
    return;
  }
  const zip = new JSZip();
  for (const item of done) {
    zip.file(getOutputName(item.file.name, item.converted.mime), item.converted.blob);
  }
  const content = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(content);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'converted.zip';
  a.click();
  URL.revokeObjectURL(url);
});

clearBtn.addEventListener('click', () => {
  files = [];
  renderFiles();
  fileInput.value = '';
});
</script>
</body>
</html>
